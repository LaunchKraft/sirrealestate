<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sir Realtor — Coming Soon</title>
  <meta name="description" content="Sir Realtor is coming soon. Your AI-powered real estate agent." />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #f8fafc;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #1e293b;
      padding: 2rem;
    }

    .card {
      text-align: center;
      max-width: 480px;
      width: 100%;
    }

    .logo {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      object-fit: cover;
      object-position: top;
      margin-bottom: 2rem;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.10);
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 0.75rem;
      color: #0f172a;
    }

    .tagline {
      font-size: 1.125rem;
      color: #475569;
      line-height: 1.6;
      margin-bottom: 2.5rem;
    }

    .badge {
      display: inline-block;
      background: #00b4d8;
      color: #fff;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0.375rem 1rem;
      border-radius: 999px;
    }

    footer {
      margin-top: 3rem;
      font-size: 0.8rem;
      color: #94a3b8;
    }

    .waitlist-form {
      margin-top: 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
      width: 100%;
      max-width: 360px;
      margin-left: auto;
      margin-right: auto;
    }

    .waitlist-form p {
      font-size: 0.9rem;
      color: #475569;
      margin-bottom: 0.25rem;
    }

    .waitlist-input-row {
      display: flex;
      width: 100%;
      gap: 0.5rem;
    }

    .waitlist-input-row input {
      flex: 1;
      padding: 0.625rem 1rem;
      border: 1.5px solid #cbd5e1;
      border-radius: 8px;
      font-size: 0.9rem;
      color: #1e293b;
      outline: none;
      transition: border-color 0.15s;
    }

    .waitlist-input-row input:focus {
      border-color: #00b4d8;
    }

    .waitlist-input-row button {
      padding: 0.625rem 1.25rem;
      background: #00b4d8;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s;
    }

    .waitlist-input-row button:hover {
      background: #0077b6;
    }

    .waitlist-input-row button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .waitlist-message {
      font-size: 0.875rem;
      padding: 0.5rem 1rem;
      border-radius: 8px;
      width: 100%;
      text-align: center;
    }

    .waitlist-message.success {
      background: #ecfdf5;
      color: #065f46;
    }

    .waitlist-message.error {
      background: #fef2f2;
      color: #991b1b;
    }
  </style>
</head>
<body>
  <div class="card">
    <img src="./logo.png" alt="Sir Realtor" class="logo" />
    <h1>Sir Realtor</h1>
    <p class="tagline">Your AI-powered real estate agent.<br>Something exciting is on the way.</p>
    <span class="badge">Coming Soon</span>

    <div class="waitlist-form">
      <p>Get early access — join the waitlist.</p>
      <div class="waitlist-input-row">
        <input id="waitlist-email" type="email" placeholder="you@example.com" autocomplete="email" />
        <button id="waitlist-btn" type="button">Join</button>
      </div>
      <div id="waitlist-message" class="waitlist-message" style="display:none"></div>
    </div>
  </div>
  <footer>&copy; 2025 Sir Realtor. All rights reserved.</footer>

  <script>
    (function () {
      var btn = document.getElementById('waitlist-btn')
      var input = document.getElementById('waitlist-email')
      var msg = document.getElementById('waitlist-message')

      function showMessage(text, type) {
        msg.textContent = text
        msg.className = 'waitlist-message ' + type
        msg.style.display = 'block'
      }

      btn.addEventListener('click', function () {
        var email = input.value.trim()
        if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
          showMessage('Please enter a valid email address.', 'error')
          return
        }
        btn.disabled = true
        btn.textContent = 'Joining…'
        msg.style.display = 'none'

        fetch('https://api.sirrealtor.com/waitlist', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: email }),
        })
          .then(function (res) {
            if (!res.ok) throw new Error('error')
            showMessage("You're on the list! We'll be in touch.", 'success')
            input.value = ''
            btn.textContent = 'Done!'
          })
          .catch(function () {
            showMessage('Something went wrong. Please try again.', 'error')
            btn.disabled = false
            btn.textContent = 'Join'
          })
      })

      input.addEventListener('keydown', function (e) {
        if (e.key === 'Enter') btn.click()
      })
    })()
  </script>
</body>
</html>
