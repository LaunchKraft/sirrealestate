<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sir Realtor — Coming Soon</title>
  <meta name="description" content="Sir Realtor is coming soon. Your AI-powered real estate agent." />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #f8fafc;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #1e293b;
      padding: 2rem;
    }

    .card {
      text-align: center;
      max-width: 480px;
      width: 100%;
    }

    .logo {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      object-fit: cover;
      object-position: top;
      margin-bottom: 2rem;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.10);
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 0.75rem;
      color: #0f172a;
    }

    .tagline {
      font-size: 1.125rem;
      color: #475569;
      line-height: 1.6;
      margin-bottom: 2.5rem;
    }

    .badge {
      display: inline-block;
      background: #00b4d8;
      color: #fff;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0.375rem 1rem;
      border-radius: 999px;
    }

    footer {
      margin-top: 3rem;
      font-size: 0.8rem;
      color: #94a3b8;
    }
  </style>
</head>
<body>
  <div class="card">
    <img src="./logo.png" alt="Sir Realtor" class="logo" />
    <h1>Sir Realtor</h1>
    <p class="tagline">Your AI-powered real estate agent.<br>Something exciting is on the way.</p>
    <span class="badge">Coming Soon</span>
  </div>
  <footer>&copy; 2025 Sir Realtor. All rights reserved.</footer>
</body>
</html>
